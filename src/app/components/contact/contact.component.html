<section id="contact">
  <div class="wrap">
    <div class="section-head fade-in in">
      <div class="kicker">{{ 'contact_kicker' | translate }}</div>
      <h2>{{ 'contact_h2' | translate }}</h2>
    </div>
    <div class="contact-wrap">
      <div class="contact-card fade-in in">
        <h3>{{ 'owner_name' | translate }}</h3>
        <div class="role">{{ 'owner_role' | translate }}</div>

        <a class="contact-line" href="tel:+919494131416">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5c0 8.3 6.7 15 15 15l3-4-6-3-2 2c-2.5-1.3-4.7-3.5-6-6l2-2-3-6-4 1c-1 0 1 3 1 3z" /></svg>
          +91 94941 31416
        </a>

        <a class="contact-line" [href]="whatsapp.link" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20l1.4-4.2A8 8 0 1 1 9 18.6L4 20z" /></svg>
          <span>{{ 'whatsapp_label' | translate }}</span>
        </a>

        <a class="contact-line" href="mailto:hello@pranadhanyaorganics.in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2" /><path d="M3 6l9 7 9-7" /></svg>
          hello&#64;pranadhanyaorganics.in
        </a>

        <a class="contact-line" [href]="mapUrl" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s7-6.5 7-11a7 7 0 1 0-14 0c0 4.5 7 11 7 11z" /><circle cx="12" cy="10" r="2.4" /></svg>
          <span>{{ 'address' | translate }}</span>
        </a>
      </div>

      <div class="map-card fade-in in">
        <div class="map-visual">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 21s7-6.5 7-11a7 7 0 1 0-14 0c0 4.5 7 11 7 11z" /><circle cx="12" cy="10" r="2.4" /></svg>
        </div>
        <div class="map-cta">
          <a class="btn btn-dark map-btn" [href]="mapUrl" target="_blank" rel="noopener">{{ 'view_on_map' | translate }}</a>
        </div>
      </div>
    </div>
  </div>
</section>
