<header>
  <div class="nav-row">
    <a class="logo" href="#top">
      <svg class="logo-mark" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" fill="#1F3D2B" />
        <path d="M20 30C20 30 12 25.5 12 18C12 13 15.8 10 20 10C24.2 10 28 13 28 18C28 25.5 20 30 20 30Z" fill="#E6B85C" />
        <path d="M20 30V14" stroke="#1F3D2B" stroke-width="1.4" stroke-linecap="round" />
      </svg>
      <span class="logo-text">
        <span class="name">Pranadhanya</span><br />
        <span class="tag">Organics</span>
      </span>
    </a>

    <button class="menu-btn" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
      <span></span>
    </button>

    <nav class="links" [class.open]="menuOpen()">
      <a href="#top" (click)="closeMenu()">{{ 'nav_home' | translate }}</a>
      <a href="#products" (click)="closeMenu()">{{ 'nav_products' | translate }}</a>
      <a href="#recipes" (click)="closeMenu()">{{ 'nav_recipes' | translate }}</a>
      <a href="#about" (click)="closeMenu()">{{ 'nav_about' | translate }}</a>
      <a href="#gallery" (click)="closeMenu()">{{ 'nav_gallery' | translate }}</a>
      <a href="#contact" (click)="closeMenu()">{{ 'nav_contact' | translate }}</a>
    </nav>

    <div class="nav-right">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" [class.active]="i18n.lang() === 'en'" (click)="setLang('en')">English</button>
        <button type="button" [class.active]="i18n.lang() === 'te'" (click)="setLang('te')">తెలుగు</button>
      </div>
    </div>
  </div>
</header>
