<section id="gallery" class="gallery-section">
  <div class="wrap">
    <div class="section-head fade-in in">
      <div class="kicker">{{ 'gal_kicker' | translate }}</div>
      <h2>{{ 'gal_h2' | translate }}</h2>
    </div>
    <div class="gal-grid">

      <div class="gal-tile fade-in in">
        <picture>
          <source srcset="assets/products/raagi.webp" type="image/webp" />
          <img class="gal-img" src="assets/products/raagi.webp" alt="Ragi" />
        </picture>
        <span>{{ 'bs_ragi' | translate }}</span>
      </div>

      <div class="gal-tile fade-in in">
        <picture>
          <source srcset="assets/products/foxtile_millets.webp" type="image/webp" />
          <img class="gal-img" src="assets/products/foxtile_millets.webp" alt="Foxtail millet" />
        </picture>
        <span>{{ 'bs_foxtail' | translate }}</span>
      </div>

      <div class="gal-tile fade-in in">
        <picture>
          <source srcset="assets/products/baadam.webp" type="image/webp" />
          <img class="gal-img" src="assets/products/baadam.webp" alt="Almonds" />
        </picture>
        <span>{{ 'bs_almonds' | translate }}</span>
      </div>

      <div class="gal-tile fade-in in">
        <picture>
          <source srcset="assets/products/jowar.webp" type="image/webp" />
          <img class="gal-img" src="assets/products/jowar.webp" alt="Jowar" />
        </picture>
        <span>{{ 'bs_jowar' | translate }}</span>
      </div>

      <div class="gal-tile fade-in in">
        <picture>
          <source srcset="assets/products/kaaju.webp" type="image/webp" />
          <img class="gal-img" src="assets/products/kaaju.webp" alt="Cashews" />
        </picture>
        <span>{{ 'bs_cashews' | translate }}</span>
      </div>

      <div class="gal-tile fade-in in">
        <picture>
          <source srcset="assets/products/spices.webp" type="image/webp" />
          <img class="gal-img" src="assets/products/spices.webp" alt="Spices" />
        </picture>
        <span>{{ 'cat_spices' | translate }}</span>
      </div>

    </div>
  </div>
</section>
